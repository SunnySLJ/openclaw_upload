# 帧龙虾 配置文件

base_url: "http://123.56.58.223:8081"
upload_url: "http://123.56.58.223:8081/api/v1/file/upload"

device_verify:
  enabled: false
  api_path: "/api/v1/device/verify"

video:
  poll_interval: 30
  max_wait_minutes: 30
  download_retries: 3
  download_retry_interval: 5
  output_dir: "./output"
  
  # 视频生成参数（可通过命令行覆盖）
  model: "auto"                  # 模型固定为 auto
  duration: 10                   # 时长：10, 15, 20 (秒，最小 10 秒)
  aspectRatio: "16:9"            # 比例：16:9, 9:16, 1:1
  variants: 1                    # 变体数量
