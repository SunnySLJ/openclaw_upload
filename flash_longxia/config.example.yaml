# 帧龙虾 配置文件
# 复制到 config.yaml 后生效

# API 基础地址
base_url: "http://123.56.58.223:8081"
upload_url: "http://123.56.58.223:8081/api/v1/file/upload"
model_config_url: "http://123.56.58.223:8081/api/v1/globalConfig/getModel"

# 设备验证（可选）
device_verify:
  enabled: false
  api_path: "/api/v1/device/verify"

# 视频生成参数
video:
  # 轮询设置
  poll_interval: 30              # 轮询间隔（秒）
  max_wait_minutes: 30           # 最长等待时间（分钟）
  download_retries: 3            # 下载重试次数
  download_retry_interval: 5     # 下载重试间隔（秒）
  output_dir: "./output"         # 输出目录
  confirm_before_generate: true  # 发起视频前是否要求人工确认
  
  # 视频生成参数（可通过命令行覆盖）
  model: "auto"                  # 默认模型，实际可选值来自 model_config_url?modelType=1
  duration: 10                   # 时长，需匹配所选模型支持项
  aspectRatio: "16:9"            # 比例，需匹配所选模型支持项
  variants: 1                    # 变体数量
